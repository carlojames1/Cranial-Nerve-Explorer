<div class="login-page">

  <div class="login-card">
    <h1>Cranial Nerve Explorer</h1>
    <p>Login to continue learning</p>

    <form (ngSubmit)="login()">

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit">LOGIN</button>

    </form>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <p class="demo">
      Demo: <strong>admin / admin</strong>
    </p>

  </div>

</div>
